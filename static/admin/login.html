<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - GrsaiProxyManager</title>
  <link rel="icon" href="/ui/admin/favicon.ico">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }
    .login-box {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .logo p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(79,70,229,0.4);
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.6); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg {
      display: none;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: #f87171;
      font-size: 0.875rem;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1>&#9889; GrsaiProxyManager</h1>
      <p>请输入管理员密码以继续</p>
    </div>
    <div class="error-msg" id="errorMsg">密码错误，请重试</div>
    <div class="form-group">
      <label>管理员密码</label>
      <input type="password" id="password" placeholder="输入密码" autofocus>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">登 录</button>
  </div>

  <script>
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      var pwd = document.getElementById('password').value;
      if (!pwd) return;
      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '验证中...';
      document.getElementById('errorMsg').style.display = 'none';
      try {
        var res = await fetch('/admin/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password: pwd})
        });
        var data = await res.json();
        if (data.ok) {
          window.location.href = '/ui/admin/';
        } else {
          document.getElementById('errorMsg').style.display = 'block';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch(e) {
        document.getElementById('errorMsg').textContent = '请求失败: ' + e.message;
        document.getElementById('errorMsg').style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }
  </script>
</body>
</html>
