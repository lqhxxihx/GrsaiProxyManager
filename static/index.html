<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nano Banana AI 绘图</title>
  <link rel="icon" href="/ui/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #e0d7ff;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(138,99,255,0.3);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
    }
    header h1 {
      font-size: 1.25rem; font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #creditsBadge {
      font-size: 0.82rem; color: #c4b5fd;
      background: rgba(167,139,250,0.12);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 20px; padding: 4px 14px;
    }
    .admin-link {
      color: #a78bfa; text-decoration: none; font-size: 0.85rem;
      border: 1px solid rgba(167,139,250,0.4); border-radius: 20px; padding: 5px 14px;
      transition: background 0.2s;
    }
    .admin-link:hover { background: rgba(167,139,250,0.15); }
    .app {
      display: grid; grid-template-columns: 300px 1fr;
      height: calc(100vh - 57px);
    }
    .controls {
      padding: 18px 14px; overflow-y: auto;
      border-right: 1px solid rgba(138,99,255,0.2);
      background: rgba(15,12,41,0.5);
      display: flex; flex-direction: column; gap: 13px;
    }
    .controls::-webkit-scrollbar { width: 4px; }
    .controls::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 10px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field > label {
      font-size: 0.74rem; color: #a78bfa; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    select, textarea, input[type="number"] {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(138,99,255,0.3); border-radius: 8px;
      color: #e0d7ff; padding: 8px 10px; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s, background 0.2s;
      font-family: inherit;
    }
    select:focus, textarea:focus, input[type="number"]:focus {
      border-color: #a78bfa; background: rgba(167,139,250,0.08);
    }
    select option { background: #1e1b4b; color: #e0d7ff; }
    textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .upload-area {
      border: 1.5px dashed rgba(138,99,255,0.4); border-radius: 8px;
      padding: 12px 8px; text-align: center; cursor: pointer;
      font-size: 0.8rem; color: #a78bfa;
      transition: border-color 0.2s, background 0.2s; position: relative;
    }
    .upload-area:hover { border-color: #a78bfa; background: rgba(167,139,250,0.07); }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    #thumbsRow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .ref-thumb { width: 46px; height: 46px; object-fit: cover; border-radius: 5px; border: 1px solid rgba(138,99,255,0.3); }
    .checkbox-row { display: flex; align-items: center; gap: 8px; }
    .checkbox-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #a78bfa; cursor: pointer; flex-shrink: 0; }
    .checkbox-row > label { text-transform: none; font-size: 0.88rem; color: #c4b5fd; letter-spacing: 0; cursor: pointer; font-weight: 400; }
    #generateBtn {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.2s, transform 0.1s; margin-top: 2px;
    }
    #generateBtn:hover { opacity: 0.9; }
    #generateBtn:active { transform: scale(0.98); }
    #generateBtn:disabled { opacity: 0.45; cursor: not-allowed; }
    .results-panel { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
    .results-panel::-webkit-scrollbar { width: 6px; }
    .results-panel::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 10px; }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-shrink: 0; }
    .results-header h2 { font-size: 0.9rem; color: #c4b5fd; font-weight: 600; }
    #clearAllBtn {
      font-size: 0.76rem; color: #f87171;
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
      border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: inherit; transition: background 0.2s;
    }
    #clearAllBtn:hover { background: rgba(248,113,113,0.2); }
    #resultsGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px; align-content: start;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(138,99,255,0.22); border-radius: 12px;
      overflow: hidden; display: flex; flex-direction: column; transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(167,139,250,0.45); }
    .card-img-wrap {
      position: relative; width: 100%; aspect-ratio: 1;
      background: rgba(0,0,0,0.35); overflow: hidden; cursor: pointer; flex-shrink: 0;
    }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .card-img-wrap:hover img { transform: scale(1.04); }
    .card-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(15,12,41,0.88); gap: 10px; z-index: 2;
    }
    .card-overlay.hidden { display: none; }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid rgba(167,139,250,0.2); border-top-color: #a78bfa;
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-wrap { width: 75%; background: rgba(255,255,255,0.1); border-radius: 10px; height: 4px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #7c3aed, #a855f7); border-radius: 10px; transition: width 0.4s ease; width: 0%; }
    .progress-label { font-size: 0.72rem; color: #c4b5fd; }
    .error-icon { font-size: 2rem; color: #f87171; }
    .error-msg { font-size: 0.73rem; color: #fca5a5; line-height: 1.4; text-align: center; padding: 0 8px; max-width: 180px; }
    .error-retry-btn {
      padding: 5px 14px; background: rgba(167,139,250,0.2);
      border: 1px solid rgba(167,139,250,0.4); border-radius: 6px;
      color: #a78bfa; font-size: 0.8rem; cursor: pointer; font-family: inherit; transition: background 0.2s;
    }
    .error-retry-btn:hover { background: rgba(167,139,250,0.35); }
    .card-meta {
      padding: 7px 10px 3px; font-size: 0.71rem; color: #9ca3af; line-height: 1.4;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; flex-shrink: 0;
    }
    .card-toolbar { display: flex; gap: 5px; padding: 6px 8px 9px; }
    .card-toolbar button {
      flex: 1; padding: 5px 0; border: 1px solid transparent;
      border-radius: 6px; font-size: 0.82rem; cursor: pointer;
      font-family: inherit; font-weight: 600; transition: opacity 0.2s;
    }
    .card-toolbar button:hover { opacity: 0.75; }
    .card-toolbar button:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-dl    { background: rgba(16,185,129,0.18);  color: #34d399; border-color: rgba(52,211,153,0.3)  !important; }
    .btn-del   { background: rgba(239,68,68,0.14);   color: #f87171; border-color: rgba(248,113,113,0.3) !important; }
    .btn-regen { background: rgba(167,139,250,0.14); color: #a78bfa; border-color: rgba(167,139,250,0.3) !important; }
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: rgba(167,139,250,0.35); }
    .empty-state .empty-icon { font-size: 3.2rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
    #lightbox.active { display: flex; }
    #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 10px; box-shadow: 0 0 60px rgba(167,139,250,0.25); object-fit: contain; }
    #lightboxClose {
      position: absolute; top: 16px; right: 20px; color: #fff; font-size: 1.4rem; cursor: pointer;
      background: rgba(255,255,255,0.12); border: none; border-radius: 50%;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: background 0.2s;
    }
    #lightboxClose:hover { background: rgba(255,255,255,0.22); }
    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; height: auto; }
      .controls { border-right: none; border-bottom: 1px solid rgba(138,99,255,0.2); max-height: 60vh; }
    }
    body.light {
      background: #f0f2f8;
      color: #1a1a2e;
    }
    body.light header {
      background: #ffffff;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    body.light #creditsBadge {
      background: rgba(109,40,217,0.1);
      border-color: rgba(109,40,217,0.25);
      color: #6d28d9;
    }
    body.light .admin-link {
      color: #6d28d9;
      border-color: rgba(109,40,217,0.3);
    }
    body.light .admin-link:hover { background: rgba(109,40,217,0.08); }
    body.light .controls {
      background: #ffffff;
      border-right: 1px solid rgba(0,0,0,0.1);
    }
    body.light .field > label { color: #6d28d9; }
    body.light select,
    body.light textarea,
    body.light input[type="number"] {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.15);
      color: #1a1a2e;
    }
    body.light select:focus,
    body.light textarea:focus,
    body.light input[type="number"]:focus {
      border-color: #7c3aed;
      background: rgba(109,40,217,0.05);
    }
    body.light select option { background: #ffffff; color: #1a1a2e; }
    body.light .upload-area {
      border-color: rgba(0,0,0,0.2);
      color: #6d28d9;
    }
    body.light .upload-area:hover { background: rgba(109,40,217,0.05); }
    body.light .checkbox-row > label { color: #4c1d95; }
    body.light .results-panel { background: #f0f2f8; }
    body.light .results-header h2 { color: #4c1d95; }
    body.light .card {
      background: #ffffff;
      border-color: rgba(0,0,0,0.1);
    }
    body.light .card:hover { border-color: rgba(109,40,217,0.35); }
    body.light .card-img-wrap { background: rgba(0,0,0,0.08); }
    body.light .card-meta { color: #555; }
    body.light .card-overlay { background: rgba(240,242,248,0.92); }
    body.light .empty-state { color: rgba(109,40,217,0.4); }
    body.light tbody tr:hover td { background: #f5f7ff; }
    #themeToggleDraw {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 5px 13px;
      transition: all 0.2s;
    }
    #themeToggleDraw:hover { background: rgba(255,255,255,0.15); }
    body.light #themeToggleDraw {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.15);
      color: #1a1a2e;
    }
    body.light #themeToggleDraw:hover { background: rgba(0,0,0,0.12); }
    body.light #apiBaseUrl,
    body.light #apiKey {
      background: rgba(0,0,0,0.05) !important;
      border-color: rgba(0,0,0,0.15) !important;
      color: #1a1a2e !important;
    }
  </style>
</head>
<body>

  <header>
    <h1>Nano Banana AI 绘图</h1>
    <div class="header-right">
      <input id="apiBaseUrl" type="text" value="http://127.0.0.1:1515" placeholder="代理地址" style="background:rgba(255,255,255,0.07);border:1px solid rgba(167,139,250,0.3);border-radius:8px;padding:5px 10px;color:#e0d7ff;font-size:0.82rem;width:180px;outline:none;">
      <input id="apiKey" type="password" placeholder="API Key" style="background:rgba(255,255,255,0.07);border:1px solid rgba(167,139,250,0.3);border-radius:8px;padding:5px 10px;color:#e0d7ff;font-size:0.82rem;width:130px;outline:none;">
      <span id="creditsBadge" style="display:none;">积分: --</span>
      <button id="themeToggleDraw" onclick="toggleDrawTheme()">&#9788; 浅色</button>
      <a class="admin-link" href="/ui/admin/">&#9881; Key管理</a>
    </div>
  </header>

  <div class="app">
    <aside class="controls">

      <div class="field">
        <label for="modelSelect">模型</label>
        <select id="modelSelect">
          <option value="nano-banana-pro">nano-banana-pro (1800)</option>
          <option value="nano-banana-2">nano-banana-2 (1300)</option>
          <option value="nano-banana-pro-vt">nano-banana-pro-vt (1800)</option>
          <option value="nano-banana-fast">nano-banana-fast (440)</option>
          <option value="nano-banana" selected>nano-banana (1400)</option>
        </select>
      </div>

      <div class="field">
        <label for="promptInput">提示词 Prompt</label>
        <textarea id="promptInput" rows="3" placeholder="描述你想要的图像..."></textarea>
      </div>

      <div class="field">
        <label>参考图片（可选，多张）</label>
        <div class="upload-area">
          <input type="file" id="refImages" accept="image/*" multiple />
          <span id="uploadLabel">点击或拖拽上传参考图</span>
        </div>
        <div id="thumbsRow"></div>
      </div>

      <div class="row2">
        <div class="field">
          <label for="aspectRatio">宽高比</label>
          <select id="aspectRatio">
            <option value="auto">auto</option>
            <option value="1:1">1:1</option>
            <option value="16:9">16:9</option>
            <option value="9:16">9:16</option>
            <option value="4:3">4:3</option>
            <option value="3:4">3:4</option>
          </select>
        </div>
        <div class="field">
          <label for="imageSize">图像尺寸</label>
          <select id="imageSize">
            <option value="1K">1K</option>
            <option value="2K">2K</option>
            <option value="4K" selected>4K</option>
          </select>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label for="batchCount">批量数量</label>
          <input type="number" id="batchCount" min="1" max="10" value="1" />
        </div>
        <div class="field">
          <label for="saveDuration">保存时长</label>
          <select id="saveDuration">
            <option value="1h">1小时</option>
            <option value="2h">2小时</option>
            <option value="permanent">永久</option>
          </select>
        </div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="autoRetry" />
        <label for="autoRetry">失败自动重试</label>
      </div>

      <button id="generateBtn">&#10022; 生成图像</button>

    </aside>

    <main class="results-panel">
      <div class="results-header">
        <h2>生成结果</h2>
        <button id="clearAllBtn">清空全部</button>
      </div>
      <div id="resultsGrid">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#127912;</div>
          <p>在左侧填写参数后点击「生成图像」</p>
        </div>
      </div>
    </main>
  </div>

  <div id="lightbox">
    <button id="lightboxClose">&#10005;</button>
    <img id="lightboxImg" src="" alt="" />
  </div>

  <script src="script.js"></script>
  <script>
    (function(){
      var saved = localStorage.getItem('draw_theme');
      if (saved === 'light') { document.body.classList.add('light'); }
      updateDrawThemeBtn();
    })();
    function updateDrawThemeBtn(){
      var btn = document.getElementById('themeToggleDraw');
      if (!btn) return;
      if (document.body.classList.contains('light')) {
        btn.innerHTML = '&#9790; 深色';
      } else {
        btn.innerHTML = '&#9788; 浅色';
      }
    }
    function toggleDrawTheme(){
      document.body.classList.toggle('light');
      localStorage.setItem('draw_theme', document.body.classList.contains('light') ? 'light' : 'dark');
      updateDrawThemeBtn();
    }
  </script>
</body>
</html>
